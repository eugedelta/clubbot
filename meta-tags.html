<!-- ============================================================
     ClubBot — favicon & social meta tags
     Paste inside <head>. Upload the files in /export to your
     site root so the absolute paths below resolve.
     ============================================================ -->

<!-- Favicons -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#D42B2B">

<!-- Open Graph (WhatsApp, iMessage, LinkedIn, Facebook) -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://clubbot.com.au/">
<meta property="og:title" content="ClubBot — a WhatsApp assistant for surf clubs">
<meta property="og:description" content="Surf conditions, rosters, SOPs and first aid — answered instantly, from your club's own documents. In the app your members already use.">
<meta property="og:image" content="https://clubbot.com.au/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="ClubBot — every answer, from your club's own documents.">

<!-- X / Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ClubBot — a WhatsApp assistant for surf clubs">
<meta name="twitter:description" content="Before the sun comes up, your members already know. Surf checks, rosters and SOPs, on WhatsApp.">
<meta name="twitter:image" content="https://clubbot.com.au/x-image.png">
